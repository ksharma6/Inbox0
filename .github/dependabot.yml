version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      pydantic:
        patterns:
          - "pydantic*"
      langchain:
        patterns:
          - "langchain*"
    ignore:
      - dependency-name: "pydantic-core"
      - dependency-name: "pyasn1*"
      - dependency-name: "pyasn1_modules"
    groups:
      pydantic:
        patterns:
          - "pydantic*"
      langchain:
        patterns:
          - "langchain*"
    ignore:
      # transitive deps — managed by their parents
      - dependency-name: "pydantic-core"
      - dependency-name: "pyasn1*"
      - dependency-name: "pyasn1_modules"